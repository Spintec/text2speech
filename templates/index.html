<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kokoro TTS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 700px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            color: #fff;
        }

        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: #aaa;
            margin-bottom: 0.4rem;
        }

        .url-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }

        .url-row input {
            flex: 1;
        }

        input[type="text"], textarea, select {
            width: 100%;
            padding: 0.6rem 0.75rem;
            border: 1px solid #333;
            border-radius: 6px;
            background: #1a1a1a;
            color: #e0e0e0;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, textarea:focus, select:focus {
            border-color: #555;
        }

        textarea {
            resize: vertical;
            min-height: 160px;
            margin-bottom: 1.25rem;
            line-height: 1.5;
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            align-items: end;
        }

        .control-group {
            flex: 1;
        }

        select {
            cursor: pointer;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        input[type="range"] {
            flex: 1;
            accent-color: #6c63ff;
            cursor: pointer;
        }

        .speed-value {
            font-size: 0.9rem;
            font-weight: 600;
            color: #fff;
            min-width: 2.5rem;
            text-align: center;
        }

        button {
            padding: 0.6rem 1.25rem;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: #6c63ff;
            color: #fff;
            width: 100%;
            padding: 0.75rem;
            font-size: 1rem;
        }

        .btn-primary:hover:not(:disabled) {
            background: #5a52d5;
        }

        .btn-secondary {
            background: #2a2a2a;
            color: #e0e0e0;
            white-space: nowrap;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #333;
        }

        .result {
            margin-top: 1.5rem;
            padding: 1.25rem;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            display: none;
        }

        .result.visible {
            display: block;
        }

        .result audio {
            width: 100%;
            margin-bottom: 0.75rem;
        }

        .download-link {
            display: inline-block;
            color: #6c63ff;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .download-link:hover {
            text-decoration: underline;
        }

        .error {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            background: #2a1515;
            border: 1px solid #5a2020;
            border-radius: 6px;
            color: #ff6b6b;
            font-size: 0.9rem;
            display: none;
        }

        .error.visible {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff4;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Kokoro TTS</h1>
        <p class="subtitle">Text-to-speech using local Kokoro-82M model</p>

        <label for="url-input">Article URL</label>
        <div class="url-row">
            <input type="text" id="url-input" placeholder="https://example.com/article">
            <button class="btn-secondary" id="fetch-btn" onclick="fetchUrl()">Fetch</button>
        </div>

        <label for="text-input">Text</label>
        <textarea id="text-input" placeholder="Enter text to speak..."></textarea>

        <div class="controls">
            <div class="control-group">
                <label for="voice-select">Voice</label>
                <select id="voice-select">
                    {% for id, name in voices.items() %}
                    <option value="{{ id }}">{{ name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="control-group">
                <label>Speed</label>
                <div class="speed-control">
                    <input type="range" id="speed-slider" min="0.5" max="2.0" step="0.1" value="1.0">
                    <span class="speed-value" id="speed-display">1.0x</span>
                </div>
            </div>
        </div>

        <button class="btn-primary" id="generate-btn" onclick="synthesize()">Generate Speech</button>

        <div class="error" id="error-box"></div>

        <div class="result" id="result-box">
            <audio controls id="audio-player"></audio>
            <a class="download-link" id="download-link" download="speech.wav">Download audio</a>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('url-input');
        const textInput = document.getElementById('text-input');
        const voiceSelect = document.getElementById('voice-select');
        const speedSlider = document.getElementById('speed-slider');
        const speedDisplay = document.getElementById('speed-display');
        const generateBtn = document.getElementById('generate-btn');
        const fetchBtn = document.getElementById('fetch-btn');
        const errorBox = document.getElementById('error-box');
        const resultBox = document.getElementById('result-box');
        const audioPlayer = document.getElementById('audio-player');
        const downloadLink = document.getElementById('download-link');

        let currentBlobUrl = null;

        speedSlider.addEventListener('input', () => {
            speedDisplay.textContent = parseFloat(speedSlider.value).toFixed(1) + 'x';
        });

        function showError(msg) {
            errorBox.textContent = msg;
            errorBox.classList.add('visible');
        }

        function hideError() {
            errorBox.classList.remove('visible');
        }

        async function fetchUrl() {
            const url = urlInput.value.trim();
            if (!url) return;

            hideError();
            fetchBtn.disabled = true;
            fetchBtn.innerHTML = '<span class="spinner"></span>Fetching';

            try {
                const res = await fetch('/fetch-url', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await res.json();
                if (!res.ok) {
                    showError(data.error || 'Failed to fetch article');
                    return;
                }
                textInput.value = data.text;
            } catch (e) {
                showError('Network error fetching URL');
            } finally {
                fetchBtn.disabled = false;
                fetchBtn.textContent = 'Fetch';
            }
        }

        async function synthesize() {
            const text = textInput.value.trim();
            if (!text) {
                showError('Please enter some text');
                return;
            }

            hideError();
            resultBox.classList.remove('visible');
            generateBtn.disabled = true;
            generateBtn.innerHTML = '<span class="spinner"></span>Generating...';

            try {
                const res = await fetch('/synthesize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text,
                        voice: voiceSelect.value,
                        speed: parseFloat(speedSlider.value)
                    })
                });

                if (!res.ok) {
                    const data = await res.json();
                    showError(data.error || 'Generation failed');
                    return;
                }

                const blob = await res.blob();

                if (currentBlobUrl) {
                    URL.revokeObjectURL(currentBlobUrl);
                }
                currentBlobUrl = URL.createObjectURL(blob);

                audioPlayer.src = currentBlobUrl;
                downloadLink.href = currentBlobUrl;
                resultBox.classList.add('visible');
                audioPlayer.play();
            } catch (e) {
                showError('Network error during synthesis');
            } finally {
                generateBtn.disabled = false;
                generateBtn.textContent = 'Generate Speech';
            }
        }

        // Allow Ctrl+Enter to generate
        textInput.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                synthesize();
            }
        });
    </script>
</body>
</html>
